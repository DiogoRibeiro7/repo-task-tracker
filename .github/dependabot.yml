version: 2

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Lisbon"
    reviewers:
      - "DiogoRibeiro7"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # Keep Python dev dependencies up to date (pytest, ruff, etc.)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Lisbon"
    reviewers:
      - "DiogoRibeiro7"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
