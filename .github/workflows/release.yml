name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without leading v (example: 1.0.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Tag and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create version tag and move v1
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          git tag -fa v1 -m "Update v1 to $TAG" "$TAG"
          git push origin v1 --force

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          gh release create "$TAG" \
            --title "Repo Task Tracker $TAG" \
            --generate-notes
