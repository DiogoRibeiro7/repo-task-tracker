name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing signed tag to release (example: v1.0.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish Release From Signed Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify signed tag exists
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags
          git rev-parse "$TAG" >/dev/null
          TYPE="$(git cat-file -t "refs/tags/$TAG" || true)"
          if [ "$TYPE" != "tag" ]; then
            echo "Tag $TAG must be an annotated tag."
            exit 1
          fi
          TAG_BODY="$(git cat-file -p "refs/tags/$TAG")"
          if ! echo "$TAG_BODY" | grep -Eq "BEGIN (PGP|SSH) SIGNATURE"; then
            echo "Tag $TAG is not signed. See RELEASE_POLICY.md."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "Repo Task Tracker $TAG" \
            --generate-notes
