name: Feature request
description: Suggest an enhancement for repo-task-tracker.
title: "[feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then propose the smallest useful solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation are you hitting today?
      placeholder: I cannot ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
      placeholder: Add an input that ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or sample tracker.json snippets.
    validations:
      required: false
