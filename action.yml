name: 'Repo Task Tracker'
description: 'Sync tracker.json tasks to GitHub Issues and optionally to a central GitHub Project (v2) board.'

author: 'Diogo Ribeiro <dfr@esmad.ipp.pt>'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  github-token:
    description: >
      Token with issues:write and (if using a project board) projects:write.
      Use a PAT stored as a secret — the default GITHUB_TOKEN cannot write
      to Projects owned by a user account.
    required: true

  project-owner:
    description: >
      GitHub login or organisation that owns the Project board.
      Leave empty to skip project board sync.
    required: false
    default: ''

  project-number:
    description: >
      Integer number of the GitHub Project board (visible in the URL:
      github.com/users/<owner>/projects/<number>).
      Leave as 0 to skip project board sync.
    required: false
    default: '0'

  tracker-path:
    description: >
      Path to tracker.json relative to the repository root.
    required: false
    default: 'tracker.json'

  tracker-glob:
    description: >
      Glob pattern for multiple tracker files. If set, overrides tracker-path.
    required: false
    default: ''

  validate:
    description: >
      Validate tracker.json only and exit without creating/updating issues.
    required: false
    default: 'false'

  dry-run:
    description: >
      Preview changes without mutating issues or project board items.
    required: false
    default: 'false'

  on-orphan:
    description: >
      How to handle tracker-labelled issues not present in tracker.json:
      warn, close, or ignore.
    required: false
    default: 'warn'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Run task sync
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PROJECT_OWNER: ${{ inputs.project-owner }}
        PROJECT_NUMBER: ${{ inputs.project-number }}
        TRACKER_PATH: ${{ inputs.tracker-path }}
        TRACKER_GLOB: ${{ inputs.tracker-glob }}
        VALIDATE_ONLY: ${{ inputs.validate }}
        DRY_RUN: ${{ inputs.dry-run }}
        ON_ORPHAN: ${{ inputs.on-orphan }}
      run: python "${{ github.action_path }}/sync_tasks.py"
